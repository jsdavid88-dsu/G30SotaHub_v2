# feed_queries — 피드 크롤러 큐레이션 (#7 Task4)
#
# 사용법: 이 파일을 backend/feed_queries.yaml 로 복사 후 편집.
#   cp backend/feed_queries.example.yaml backend/feed_queries.yaml
# (파일이 없으면 feed_crawler 가 6개 피드 소스를 전부 빈 리스트로 early-return → feed 0건)
#
# - huggingface_trending / paperswithcode: 외부 trending API → 빈 설정({})으로도 즉시 동작
# - youtube / x / reddit: 채널·계정·자격증명을 채워야 동작

# HuggingFace 일일 trending papers (빈 dict 로 기본 동작)
huggingface_trending: {}

# Papers With Code — 비활성 (소스 폐기: /latest 가 302→HF 이전). HF daily_papers 가 papers 커버 (#7)
# paperswithcode: {}

# crawl4ai 웹 검색 쿼리 (선택)
crawl4ai_queries: []
#  - "text to video generation 2026"
#  - "diffusion model VFX"

# YouTube 채널 (RSS) — channel_id 채우면 동작
youtube_channels: []
#  - channel_id: "UCbfYPyITQ-7l4upoX8nvctg"   # 예: Two Minute Papers
#    name: "Two Minute Papers"
#    tags: ["research", "video"]
max_per_channel: 5

# X(트위터) 계정 — Playwright + 저장된 로그인 세션(login_helper.py). handle 의 프로필을 긁음.
x_accounts: []
#  - handle: "example_account"
#    tags: ["vfx"]
max_per_account: 10

# Reddit — .env 에 REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET 필요
reddit:
  subreddits: []        # ["StableDiffusion", "comfyui", "MachineLearning"]
  keywords: []
  days_back: 3
  max_per_sub: 15

# 아카라이브 — Playwright + 저장된 로그인 세션(login_helper.py). 채널 글목록 수집.
# Cloudflare/로그인은 저장된 프로필로 통과. channels 비면 skip.
arca:
  channels: []
  #  - slug: "aiart"        # AI 그림 채널 (arca.live/b/aiart)
  #    tags: ["ai-art"]
  max_per_channel: 15
